services:
  postgres:
    image: postgres:16-alpine
    container_name: borrowabook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-borrowabook}
      POSTGRES_USER: ${POSTGRES_USER:-borrowabook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-borrowabook}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-borrowabook} -d ${POSTGRES_DB:-borrowabook}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./BorrowABook
      dockerfile: Dockerfile
    container_name: borrowabook-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-borrowabook}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-borrowabook}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-borrowabook}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      SPRING_JPA_OPEN_IN_VIEW: "false"
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@borrowabook.local}
      APP_FRONTEND_LOGIN_URL: ${APP_FRONTEND_LOGIN_URL:-http://localhost:3000/login}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-localhost}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-false}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./BorrowABookFrontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8080/api}
    container_name: borrowabook-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  postgres_data:

